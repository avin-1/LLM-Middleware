# ============================================================
# Sentinel Academy — MkDocs Material Configuration
# ============================================================
site_name: "Sentinel Academy"
site_url: "https://dmitrl-dev.github.io/AISecurity/academy/"
site_description: "AI Security Training Platform — Learn to defend AI systems"
site_author: "Sentinel Community"
repo_url: "https://github.com/DmitrL-dev/AISecurity"
repo_name: "DmitrL-dev/AISecurity"

# ============================================================
# Theme
# ============================================================
theme:
  name: material
  language: en
  favicon: assets/favicon.ico

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: "Switch to dark mode"
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: "Switch to light mode"

  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.prune
    - navigation.path
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

  icon:
    repo: fontawesome/brands/github

# ============================================================
# Plugins
# ============================================================
plugins:
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      languages:
        - locale: en
          default: true
          name: "English"
          build: true
        - locale: ru
          name: "Русский"
          build: true
          theme:
            language: ru
          nav_translations:
            Home: "Главная"
            Beginner: "Начинающий"
            Intermediate: "Средний"
            Advanced: "Продвинутый"
            Labs: "Лаборатории"
            "AI Fundamentals": "Основы ИИ"
            "Threat Landscape": "Ландшафт угроз"
            "Attack Vectors": "Векторы атак"
            "Agentic Security": "Безопасность агентов"
            "Defense Strategies": "Стратегии защиты"
            "Sentinel Integration": "Интеграция Sentinel"
            "Getting Started": "Начало работы"

  - search:
      lang:
        - en
        - ru
      separator: '[\s\-\.]+'

  - minify:
      minify_html: true

